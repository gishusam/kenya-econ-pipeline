
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://kenya_user:kenya_pass@postgres/kenya_econ
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: kenya_econ
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    OPEN_EXCHANGE_APP_ID: ${OPEN_EXCHANGE_APP_ID}
    DBT_PROJECT_DIR: /opt/airflow/kenya_econ_dbt
  volumes:
    - .:/opt/airflow
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: kenya_econ_db
    environment:
      POSTGRES_DB: kenya_econ
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d kenya_econ"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install psycopg2-binary dbt-postgres==1.7.0 tenacity python-dotenv -q
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com
        echo "INIT COMPLETE"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: >
      bash -c "pip install psycopg2-binary dbt-postgres==1.7.0 tenacity python-dotenv -q &&
               airflow webserver"
    ports:
      - "8081:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: >
      bash -c "pip install psycopg2-binary dbt-postgres==1.7.0 tenacity python-dotenv -q &&
               airflow scheduler"
    restart: always

volumes:
  postgres_data: