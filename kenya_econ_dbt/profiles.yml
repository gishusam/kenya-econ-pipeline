kenya_econ_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost 
      port: 5432
      dbname: kenya_econ
      user: kenya_user
      password: kenya_pass
      schema: mart
      threads: 4

    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT') | int }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      schema: mart
      threads: 4
      sslmode: require